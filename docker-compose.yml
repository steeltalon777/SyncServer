services:
  syncserver:
    build: .
    container_name: syncserver
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - backend

  migrate:
    build: .
    profiles:
      - tools
    env_file:
      - .env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    networks:
      - backend

networks:
  backend:
    external: true
