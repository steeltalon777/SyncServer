[pytest]
asyncio_mode = auto
testpaths = tests
norecursedirs = scripts tools alembic .venv .git __pycache__ .pytest_cache
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Маркеры для таксономии тестов
markers =
    unit: быстрые локальные тесты без реального HTTP и БД
    stand: тесты, требующие внешнего поднятого стенда
    integration: stand-based API and repository integration
    e2e: длинные пользовательские workflow
    smoke: минимальная проверка доступности стенда
    serial: нельзя параллелить
    destructive: агрессивно изменяет состояние стенда
    requires_reset: требует заранее сброшенного known baseline
    stand_db: прямое обращение к stand database (отдельный guard)

# Настройки по умолчанию для stand тестов
# По умолчанию stand тесты не запускаются
addopts = -m "not stand"

# Переменные окружения для stand тестов
# SYNC_TEST_MODE=stand
# SYNC_TEST_ALLOW_STAND=1
# SYNC_TEST_BASE_URL=http://host:port
# SYNC_TEST_ROOT_TOKEN=<token>
# SYNC_TEST_DB_URL=<dsn>
# SYNC_TEST_ALLOW_DIRECT_DB=1
